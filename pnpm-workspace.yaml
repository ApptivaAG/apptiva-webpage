allowBuilds:
  esbuild: true
  sharp: true
  unrs-resolver: true

# Auto-install peer dependencies
autoInstallPeers: true

# Dependency update settings
updateConfig:
  ignoreDependencies:
    - remark-gfm
    - next-mdx-remote

# Overrides for security fixes and version pinning
overrides:
  js-yaml: ">=3.14.2"
  uuid: ">=14.0.0"
  postcss: ">=8.5.10"
  brace-expansion: ">=5.0.6"
  jsdom: "27.3.0"
  "@sanity/icons": "3.7.4"
